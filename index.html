<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SoundBox Player</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>

<div id="lockScreen" class="lock-screen">
  <div class="lock-box">
    <h1>🔒 Belépés</h1>
    <p>Írd be a belépési kódot:</p>
    <input type="password" id="accessCodeInput" placeholder="Kód">
    <button id="accessCodeBtn">Belépés</button>
    <p id="accessError" class="error-msg"></p>
  </div>
</div>

<div id="app" class="player-container hidden">

  <div class="title-row">
    <h1>🔥 SoundBox Player</h1>
    <button class="install-btn" id="installBtn">＋</button>
  </div>

  <div id="nowPlaying" class="now-playing">🎵 Nincs lejátszás</div>

  <div id="floatingPlayer" class="floating-player">

    <div class="equalizer">
      <div class="bar bar1"></div>
      <div class="bar bar2"></div>
      <div class="bar bar3"></div>
      <div class="bar bar4"></div>
      <div class="bar bar5"></div>
    </div>

    <audio id="audioPlayer" controls></audio>

    <div class="player-buttons">
      <button id="prevBtn">⏮ Előző</button>
      <button id="nextBtn">⏭ Következő</button>
    </div>
  </div>

  <div class="controls">
    <button id="playAllBtn">Összes lejátszása</button>
    <button id="favoritesBtn">Kedvencek lejátszása</button>
    <button id="playlistBtn">Kijelöltek lejátszása</button>
  </div>

  <h2 style="margin-top: 25px;">Zenék</h2>
  <ul id="songList"></ul>

</div>

<script src="js/app.js"></script>
</body>
</html>
